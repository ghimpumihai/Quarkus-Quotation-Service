version: '3.8'

services:
  quotation-db:
    image: postgres:14-alpine
    container_name: quotation-db
    environment:
      POSTGRES_DB: quotation-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  proposal-db:
    image: postgres:14-alpine
    container_name: proposal-db
    environment:
      POSTGRES_DB: proposal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5434:5432"
    logging: *default-logging

  conduktor-db:
    image: postgres:14-alpine
    container_name: conduktor-db
    environment:
      POSTGRES_DB: conduktor
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d conduktor"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  conduktor-console:
    image: conduktor/conduktor-console:latest
    container_name: conduktor-console
    depends_on:
      conduktor-db:
        condition: service_healthy
    ports:
      - "9080:8080"
    environment:
      - CDK_DATABASE_URL=postgresql://admin:password@conduktor-db:5432/conduktor
      - CD_DB_ENCRYPTION_KEY=some-secret-key-at-least-32-chars-long
      - CDK_DATABASE_TYPE=postgres
    logging: *default-logging

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL://127.0.0.1:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    logging: *default-logging