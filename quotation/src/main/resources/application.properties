# --- DB (Fixed hyphen in URL) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=1234
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/quotation
quarkus.hibernate-orm.schema-management.strategy=validate

# --- KAFKA (Ensured both property types) ---
kafka.bootstrap.servers=127.0.0.1:9092
quarkus.devservices.enabled=false

# --- MESSAGING ---
mp.messaging.outgoing.quotation-channel.connector=smallrye-kafka
mp.messaging.outgoing.quotation-channel.topic=quotation

# --- REST CLIENT ---
quarkus.rest-client."org.stef.client.CurrencyPriceClient".url=https://economia.awesomeapi.com.br/json

# ---FLYWAY---
quarkus.flyway.enabled=true
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db.migrations